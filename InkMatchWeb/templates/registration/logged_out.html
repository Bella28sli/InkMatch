{% extends "admin/base_site.html" %}
{% load i18n static %}

{% block title %}InkMatch Admin Logout{% endblock %}

{% block content %}
  <div class="inkmatch-login-shell">
    <section class="inkmatch-panel">
      <span class="inkmatch-badge">Выход выполнен</span>
      <h1 class="inkmatch-title" style="margin-top:10px;">Вы вышли из админки</h1>
      <p class="inkmatch-subtitle" style="margin-top:12px;">
        Сессия завершена. Можно войти снова или вернуться на экран входа.
      </p>
      <p style="margin-top:18px;">
        <a class="button default" href="{% url 'admin:login' %}">Войти снова</a>
      </p>
    </section>
  </div>
{% endblock %}
